spring.application.name=loan-management-app

spring.datasource.url=${DB_URL:jdbc:postgresql://ep-wild-mouse-anaao343-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_VrMz2ie0Wnxg}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Open-in-View to remove warning
spring.jpa.open-in-view=false

# Server Configuration
server.port=${PORT:8080}

# CORS — extra allowed origins injected at runtime via Render env var CORS_ALLOWED_ORIGINS
# Example: CORS_ALLOWED_ORIGINS=https://loansphere-one.vercel.app,https://myother.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
